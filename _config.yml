# -----------------------------------------------------------------------------
# News / announcements on about page
# -----------------------------------------------------------------------------

announcements:
  enabled: true
  scrollable: true
  limit: 5          # show latest 5

latest_posts:
  enabled: false    # set true if you start a blog

# -----------------------------------------------------------------------------
# Publications (jekyll-scholar)
# -----------------------------------------------------------------------------

scholar:
  last_name: [Tashfeen]
  first_name: [Muhammad, Tehmasib, Ali]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib

  replace_strings: true
  join_strings: true

  group_by: year
  group_order: descending

filtered_bibtex_keywords:
  [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp,
   blog, code, poster, slides, website, preview, altmetric, dimensions]

max_author_limit: 3
more_authors_animation_delay: 10
enable_publication_thumbnails: false

# -----------------------------------------------------------------------------
# Theme / UI options
# -----------------------------------------------------------------------------

enable_darkmode: true
enable_navbar_social: true    # shows social icons in navbar
enable_tooltips: false
enable_medium_zoom: true
enable_progressbar: true
navbar_fixed: true
search_enabled: true
bib_search: true

# -----------------------------------------------------------------------------
# Collections — keep these as-is from the al-folio template
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: false
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

# -----------------------------------------------------------------------------
# Plugins — keep these as-is from the al-folio template
